name: OSINT search tests

on:
  push:
    branches: [main, master, dev]
    paths:
      - "supabase/functions/osint-search/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/osint-tests.yml"
  pull_request:
    paths:
      - "supabase/functions/osint-search/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Corre dos suites:
      # 1) osintSearch.test.ts - parseo/clasificación con fixtures HTML, sin red.
      # 2) osintSearch.integration.test.ts - llama a la Edge Function ya
      #    desplegada en Supabase (esa función es la que consulta a
      #    DuckDuckGo desde la red de Supabase, no desde este runner, así
      #    que no depende de la IP compartida de GitHub para evitar bloqueos).
      #    Se salta sola si faltan los secrets de Supabase.
      - name: Run OSINT parsing/classification + integration tests
        run: npx vitest run supabase/functions/osint-search --reporter=verbose
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
