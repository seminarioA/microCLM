name: Email module tests

on:
  push:
    branches: [main, dev]
    paths:
      - "supabase/functions/send-email/**"
      - "supabase/functions/track-email-open/**"
      - "supabase/functions/track-email-click/**"
      - "src/modules/profile/EmailComposeModal.tsx"
      - "src/modules/profile/EmailComposeModal.test.ts"
      - "src/lib/crm.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/email-tests.yml"
  pull_request:
    paths:
      - "supabase/functions/send-email/**"
      - "supabase/functions/track-email-open/**"
      - "supabase/functions/track-email-click/**"
      - "src/modules/profile/EmailComposeModal.tsx"
      - "src/modules/profile/EmailComposeModal.test.ts"
      - "src/lib/crm.ts"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cubre la lógica pura de las 3 Edge Functions del módulo de correo
      # (armado de HTML instrumentado con pixel + links trackeados,
      # resolución del redirect de clic, idempotencia del registro de
      # apertura) más el escapado de HTML del compositor en el frontend.
      # Sin llamadas de red: no depende de Resend ni de funciones
      # desplegadas, así que no es flaky.
      - name: Run email module unit tests
        run: npx vitest run supabase/functions/send-email supabase/functions/track-email-open supabase/functions/track-email-click src/modules/profile/EmailComposeModal.test.ts --reporter=verbose
